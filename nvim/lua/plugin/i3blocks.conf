# ~/.config/i3blocks/config
# Estética: separadores con iconos nerd font, colores tokyonight

[settings]
separator=false
separator_block_width=0

# ===========================
#   ESPACIADOR IZQUIERDA
# ===========================
[spacer]
full_text=
interval=once
color=#1e1e2e

# ===========================
#   CPU
# ===========================
[cpu_sep]
full_text= 
color=#7aa2f7
interval=once

[cpu]
command=echo "󰘚 $(grep 'cpu ' /proc/stat | awk '{usage=($2+$4)*100/($2+$4+$5)} END {printf "%.0f%%", usage}')"
interval=2
color=#c0caf5
min_width=󰘚 100%

# ===========================
#   RAM
# ===========================
[ram_sep]
full_text=  
color=#7aa2f7
interval=once

[ram]
command=echo "󰍛 $(free -h | awk '/^Mem/ {print $3 "/" $2}')"
interval=5
color=#c0caf5

# ===========================
#   DISCO
# ===========================
[disk_sep]
full_text=  
color=#7aa2f7
interval=once

[disk]
command=echo "󰋊 $(df -h / | awk 'NR==2 {print $3 "/" $2}')"
interval=30
color=#c0caf5

# ===========================
#   RED
# ===========================
[net_sep]
full_text=  
color=#7aa2f7
interval=once

[network]
command=\
  WIFI=$(iwgetid -r 2>/dev/null); \
  ETH=$(ip link show | grep -E '^[0-9]+: e' | awk -F': ' '{print $2}' | head -1); \
  ETH_UP=$(cat /sys/class/net/$ETH/operstate 2>/dev/null); \
  if [ -n "$WIFI" ]; then \
    SIGNAL=$(awk 'NR==3{printf "%.0f", $3*10/7}' /proc/net/wireless 2>/dev/null); \
    echo "󰤨 $WIFI ${SIGNAL}%"; \
  elif [ "$ETH_UP" = "up" ]; then \
    echo "󰈀 Ethernet"; \
  else \
    echo "󰤭 Sin red"; \
  fi
interval=5
color=#c0caf5

# ===========================
#   VOLUMEN
# ===========================
[vol_sep]
full_text=  
color=#7aa2f7
interval=once

[volume]
command=\
  VOL=$(amixer get Master | grep -oP '\d+%' | head -1 | tr -d '%'); \
  MUTE=$(amixer get Master | grep -o '\[off\]'); \
  if [ -n "$MUTE" ]; then \
    echo "󰝟 Mute"; \
  elif [ "$VOL" -ge 70 ]; then \
    echo "󰕾 ${VOL}%"; \
  elif [ "$VOL" -ge 30 ]; then \
    echo "󰖀 ${VOL}%"; \
  else \
    echo "󰕿 ${VOL}%"; \
  fi
interval=2
color=#c0caf5
# Subir/bajar volumen con scroll
#SCRIPTPATH=/usr/share/i3blocks

# ===========================
#   BATERÍA
# ===========================
[bat_sep]
full_text=  
color=#7aa2f7
interval=once

[battery]
command=\
  STAT=$(cat /sys/class/power_supply/BAT0/status 2>/dev/null); \
  CAP=$(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null); \
  if [ -z "$CAP" ]; then echo "󰁹 N/A"; exit; fi; \
  if [ "$STAT" = "Charging" ]; then ICON="󰂄"; \
  elif [ "$CAP" -ge 90 ]; then ICON="󰁹"; \
  elif [ "$CAP" -ge 70 ]; then ICON="󰂁"; \
  elif [ "$CAP" -ge 50 ]; then ICON="󰁿"; \
  elif [ "$CAP" -ge 20 ]; then ICON="󰁼"; \
  else ICON="󰁺"; \
  fi; \
  echo "$ICON ${CAP}%"
interval=30
color=#c0caf5

# ===========================
#   TEMPERATURA CPU
# ===========================
[temp_sep]
full_text=  
color=#7aa2f7
interval=once

[temperature]
command=\
  TEMP=$(cat /sys/class/thermal/thermal_zone0/temp 2>/dev/null); \
  if [ -n "$TEMP" ]; then \
    TEMP=$((TEMP/1000)); \
    if [ "$TEMP" -ge 80 ]; then COLOR="#f38ba8"; \
    elif [ "$TEMP" -ge 60 ]; then COLOR="#e0af68"; \
    else COLOR="#c0caf5"; fi; \
    echo "󰔏 ${TEMP}°C"; \
  fi
interval=5
color=#c0caf5

# ===========================
#   FECHA Y HORA
# ===========================
[date_sep]
full_text=  
color=#7aa2f7
interval=once

[datetime]
command=echo "󰃮 $(date '+%a %d %b')  󰥔 $(date '+%H:%M')"
interval=30
color=#c0caf5

# ===========================
#   ESPACIADOR DERECHA
# ===========================
[spacer_right]
full_text= 
interval=once
color=#1e1e2e
